<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>スライド式スケジュール</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="bar">
  <h1>スライド式スケジュール</h1>
  <span class="legend"><span>■予定</span><span>□確定</span><span>★マイルストーン</span><span>＝連日</span></span>
  <span class="sp"></span>
  <button id="btnPrevM" class="ghost" title="前の月へ">◀</button>
  <select id="monthJump" class="mjump" title="月へジャンプ"></select>
  <button id="btnNextM" class="ghost" title="次の月へ">▶</button>
  <button id="btnToday" class="ghost">今日へ</button>
  <button id="btnAdd">＋ 追加</button>
  <button id="btnCloudSync" title="クラウドと同期">☁️ 同期</button>
  <button id="btnCloudKey" class="ghost" title="同期コードを確認・変更">🔑</button>
  <button id="btnChangePw" class="ghost" title="パスワードを変更">🔐</button>
  <button id="btnHoliday" class="ghost" title="祝日・休日の管理">📅 休日</button>
  <button id="btnRR" class="ghost" title="ルーティン行の設定">⚙ ルーティン</button>
</header>

<div id="scroll">
  <div id="grid">
    <div id="colbg"></div>
    <div id="today"></div>
    <div id="head"></div>
    <div id="lanes"></div>
    <div id="routines"></div>
    <div id="daynotes"></div>
    <div id="daynotes2"></div>
    <div id="daynotes3"></div>
    <div id="daynotes4"></div>
    <div id="daynotes5"></div>
  </div>
</div>

<!-- 追加・編集 -->
<div id="ov" class="ov">
  <div class="card">
    <h2 id="mTitle">タスクを追加</h2>
    <div class="fld">
      <label>種別</label>
      <div class="seg" id="segType">
        <button data-t="plan">■ 予定</button>
        <button data-t="fix">□ 確定</button>
        <button data-t="ms">★ マイルストーン</button>
      </div>
    </div>
    <div class="fld">
      <label>タイトル <span style="color:#c62828">*</span></label>
      <input id="fTitle" placeholder="例）DR会議">
    </div>
    <div class="row2">
      <div class="fld"><label>開始日</label><input id="fStart" type="date"></div>
      <div class="fld"><label>終了日（連日のみ）</label><input id="fEnd" type="date"></div>
    </div>
    <div class="fld"><label>行（レーン）</label><input id="fLane" type="number" min="0" value="0"></div>
    <hr style="border:none;border-top:1px solid #eee;margin:4px 0 10px">
    <div style="font-size:12px;color:#888;margin-bottom:8px">オプション（無ければ空欄でOK／タイトルのみ表示）</div>
    <div class="row2">
      <div class="fld"><label>時間（@）</label><input id="fTime" placeholder="18:00"></div>
      <div class="fld"><label>場所（in）</label><input id="fPlace" placeholder="横浜駅"></div>
    </div>
    <div class="fld"><label>人（with）</label><input id="fWho" placeholder="田中, 鈴木"></div>
    <div class="actions">
      <button id="btnDelete" class="danger" style="display:none">削除</button>
      <span class="sp"></span>
      <button id="btnCancel" class="cancel">キャンセル</button>
      <button id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- 確定確認 -->
<div id="cf" class="ov">
  <div class="card">
    <h2>確定しますか？</h2>
    <p id="cfMsg"></p>
    <div class="actions">
      <span class="sp"></span>
      <button id="cfNo" class="cancel">いいえ</button>
      <button id="cfYes">はい</button>
    </div>
  </div>
</div>

<!-- 汎用 確認ダイアログ -->
<div id="ask" class="ov">
  <div class="card">
    <h2 id="askTitle">確認</h2>
    <p id="askMsg"></p>
    <div class="actions">
      <span class="sp"></span>
      <button id="askNo" class="cancel">いいえ</button>
      <button id="askYes" class="danger">はい</button>
    </div>
  </div>
</div>

<!-- ルーティン行リスト設定 -->
<div id="rrOv" class="ov">
  <div class="card">
    <h2>ルーティン行の設定</h2>
    <div id="rrList"></div>
    <button id="rrAddBtn" style="margin-top:10px;width:100%">＋ 行を追加</button>
    <div class="actions" style="margin-top:10px">
      <span class="sp"></span>
      <button id="rrClose" class="cancel">閉じる</button>
    </div>
  </div>
</div>

<!-- ルーティン行 編集 -->
<div id="rrEditOv" class="ov">
  <div class="card">
    <h2 id="rrEditTitle">ルーティン行を追加</h2>
    <div class="fld"><label>行名</label><input id="rrFLabel" placeholder="例：ジム、酒"></div>
    <div class="fld">
      <label>背景色</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="rrFColor" type="color" value="#fff9c4" style="width:48px;height:34px;border:1px solid #ccc;border-radius:6px;padding:2px;cursor:pointer">
        <span id="rrFColorHex" style="font-size:12px;color:#666">#fff9c4</span>
      </div>
    </div>
    <div class="fld">
      <label>マーカー（カンマ区切りで複数設定可）</label>
      <input id="rrFMarkers" placeholder="例: ジ　または　MH,MY">
      <span style="font-size:11px;color:#888;margin-top:3px">クリックするたびに順番に切替 → 最後の次は空白に戻る</span>
    </div>
    <div class="actions">
      <button id="rrFDelete" class="danger" style="display:none">削除</button>
      <span class="sp"></span>
      <button id="rrFCancel" class="cancel">キャンセル</button>
      <button id="rrFSave">保存</button>
    </div>
  </div>
</div>

<!-- パスワード画面（起動時オーバーレイ） -->
<div id="pwScreen" class="pw-screen">
  <div class="pw-card">
    <div class="pw-logo">📅</div>
    <h2 id="pwScreenTitle">パスワードを入力</h2>
    <p id="pwScreenSub" class="pw-sub"></p>

    <!-- ログイン -->
    <div id="pwLogin">
      <div class="pw-fld">
        <input id="pwInput" type="password" maxlength="4" inputmode="numeric"
               pattern="[0-9]*" placeholder="••••" class="pw-input" autocomplete="current-password">
      </div>
      <p id="pwErr" class="pw-err"></p>
      <button id="pwSubmit" class="pw-btn">開く</button>
    </div>

    <!-- 登録 -->
    <div id="pwRegister" style="display:none">
      <div class="pw-fld">
        <label class="pw-label">新しいパスワード（4桁）</label>
        <input id="pwNew1" type="password" maxlength="4" inputmode="numeric"
               pattern="[0-9]*" placeholder="••••" class="pw-input" autocomplete="new-password">
      </div>
      <div class="pw-fld">
        <label class="pw-label">確認入力</label>
        <input id="pwNew2" type="password" maxlength="4" inputmode="numeric"
               pattern="[0-9]*" placeholder="••••" class="pw-input" autocomplete="new-password">
      </div>
      <p id="pwRegErr" class="pw-err"></p>
      <button id="pwRegSubmit" class="pw-btn">設定して開く</button>
    </div>
  </div>
</div>

<!-- 祝日・休日管理パネル -->
<div id="holOv" class="ov">
  <div class="card" style="max-height:80vh;overflow-y:auto">
    <h2>祝日・休日の管理</h2>
    <div id="holList" style="font-size:13px;margin-bottom:12px"></div>
    <hr style="border:none;border-top:1px solid #eee;margin:4px 0 10px">
    <div style="font-weight:700;margin-bottom:8px;color:#1f3b57">会社・カスタム休日を追加</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <label for="holDate" class="sr-only">日付</label>
      <input id="holDate" type="date" style="flex:0 0 auto" aria-label="日付">
      <label for="holName" class="sr-only">名称</label>
      <input id="holName" placeholder="名称（例：夏季休暇）" style="flex:1;min-width:120px" aria-label="名称">
      <button id="holAddBtn">追加</button>
    </div>
    <div class="actions" style="margin-top:10px">
      <span class="sp"></span>
      <button id="holClose" class="cancel">閉じる</button>
    </div>
  </div>
</div>

<!-- パスワード変更モーダル -->
<div id="pwChangeOv" class="ov">
  <div class="card">
    <h2>パスワードを変更</h2>
    <div class="fld">
      <label>現在のパスワード</label>
      <input id="pwCurr" type="password" maxlength="4" inputmode="numeric" placeholder="••••" style="letter-spacing:6px;text-align:center;font-size:18px">
    </div>
    <div class="fld">
      <label>新しいパスワード（4桁）</label>
      <input id="pwChNew1" type="password" maxlength="4" inputmode="numeric" placeholder="••••" style="letter-spacing:6px;text-align:center;font-size:18px">
    </div>
    <div class="fld">
      <label>確認入力</label>
      <input id="pwChNew2" type="password" maxlength="4" inputmode="numeric" placeholder="••••" style="letter-spacing:6px;text-align:center;font-size:18px">
    </div>
    <p id="pwChErr" class="pw-err" style="margin:0 0 8px"></p>
    <div class="actions">
      <span class="sp"></span>
      <button id="pwChCancel" class="cancel">キャンセル</button>
      <button id="pwChSave">変更</button>
    </div>
  </div>
</div>

<script src="store.js"></script>
<script src="app.js"></script>
</body>
</html>
