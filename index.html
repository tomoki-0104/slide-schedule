<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>スライド式スケジュール（モバイル統合版）</title>
<style>
:root{
  --day-w: 46px;
  --lane-h: 30px;
  --head-h: 70px;
  --grey:#d9d9d9;
  --line:#cfcfcf;
  --sat:#1565c0;
  --sun:#d32f2f;
  --ms:#c62828;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;font-family:"Segoe UI","Yu Gothic UI","Hiragino Sans","Meiryo",sans-serif;color:#222;}
body{display:flex;flex-direction:column;background:#fafafa;}
header.bar{
  display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1f3b57;color:#fff;flex:0 0 auto;flex-wrap:wrap;
}
header.bar h1{font-size:15px;margin:0;font-weight:600;}
header.bar .sp{flex:1;}
button{font:inherit;border:none;border-radius:6px;padding:6px 12px;background:#2e577d;color:#fff;cursor:pointer;}
button.ghost{background:#3d6488;}
button:hover{filter:brightness(1.08);}
.mjump{font:inherit;border:none;border-radius:6px;padding:6px 8px;background:#2e577d;color:#fff;cursor:pointer;}
.legend{font-size:11px;color:#cfe0f0;display:flex;gap:10px;flex-wrap:wrap;}
#linkStat{font-size:11px;color:#bfe3c4;display:flex;align-items:center;}
#scroll{flex:1 1 auto;overflow:auto;position:relative;background:#fff;cursor:grab;}
#scroll.drag{cursor:grabbing;-webkit-user-select:none;user-select:none;}
#grid{position:relative;}
#colbg{position:absolute;top:0;left:0;}
.col{position:absolute;top:0;width:var(--day-w);}
.col.grey{background:var(--grey);}
.vline{position:absolute;top:0;width:1px;background:var(--line);}
.vline.month{width:2px;background:#7e8b97;z-index:1;}
#today{position:absolute;top:0;width:2px;background:#e53935;z-index:5;}
#today::before{content:"";position:absolute;top:-1px;left:-3px;width:8px;height:8px;border-radius:50%;background:#e53935;}
#head{position:relative;height:var(--head-h);z-index:3;-webkit-user-select:none;user-select:none;}
.mrow{position:absolute;left:0;height:24px;}
.mcell{position:absolute;top:0;height:24px;border-left:2px solid #7e8b97;border-bottom:1px solid #9aa7b3;
  font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;background:#eef2f6;}
.drow{position:absolute;left:0;top:24px;height:22px;}
.wrow{position:absolute;left:0;top:46px;height:24px;}
.dcell,.wcell{position:absolute;top:0;width:var(--day-w);height:100%;
  display:flex;align-items:center;justify-content:center;font-size:12px;border-left:1px solid var(--line);}
.dcell{font-weight:600;cursor:pointer;}
.dcell.sat,.wcell.sat{color:var(--sat);}
.dcell.sun,.wcell.sun{color:var(--sun);}
#lanes{position:relative;z-index:2;touch-action:pan-x pan-y;-webkit-user-select:none;user-select:none;}
.laneline{position:absolute;left:0;height:1px;background:#eee;}
.selbox{position:absolute;height:calc(var(--lane-h) - 4px);background:rgba(33,118,194,.18);
  border:1px solid rgba(33,118,194,.5);border-radius:4px;z-index:1;pointer-events:none;}
.task{position:absolute;height:24px;line-height:24px;white-space:nowrap;font-size:12.5px;
  padding:0 4px;cursor:pointer;border-radius:4px;z-index:2;}
.task:hover{background:rgba(33,118,194,.08);outline:1px solid rgba(33,118,194,.35);}
.task.sel{outline:2px solid #2176c2;background:rgba(33,118,194,.16);box-shadow:0 0 0 2px rgba(33,118,194,.2);}
.task.dragging{opacity:.7;z-index:20;}
.task .mk{cursor:pointer;font-weight:700;padding:0 2px;}
.task.ms{color:var(--ms);font-weight:700;}
/* 騾｣譌･繧ｿ繧ｹ繧ｯ・壹・繝ｼ繧ｫ繝ｼ繧貞推譌･蛻励↓驟咲ｽｮ縺・・・騾｣邨千ｷ壹〒縺､縺ｪ縺・*/
.task .spanwrap{position:relative;display:inline-block;height:24px;vertical-align:top;}
.task .spanwrap .mk{position:absolute;top:0;padding:0;}
.task .spanwrap .lnk{position:absolute;top:9px;height:0;border-top:3px double currentColor;}
.inlineEdit{position:absolute;height:24px;font:inherit;font-size:12.5px;padding:0 4px;
  border:1px solid #2176c2;border-radius:4px;z-index:10;background:#fff;outline:none;}
/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:50;}
.ov.show{display:flex;}
.card{background:#fff;border-radius:10px;padding:16px;width:min(420px,92vw);max-height:90vh;overflow:auto;}
.card h2{margin:0 0 12px;font-size:15px;}
.fld{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.fld label{font-size:12px;color:#555;}
.fld input,.fld select{font:inherit;padding:7px;border:1px solid #ccc;border-radius:6px;}
.row2{display:flex;gap:8px;}
.row2>.fld{flex:1;}
.seg{display:flex;gap:6px;}
.seg button{flex:1;background:#eef2f6;color:#333;border:1px solid #d3dbe2;}
.seg button.on{background:#1f3b57;color:#fff;border-color:#1f3b57;}
.actions{display:flex;gap:8px;margin-top:6px;}
.actions .sp{flex:1;}
button.danger{background:#c62828;}
button.cancel{background:#888;}
/* confirm */
#cf .card{width:min(320px,90vw);text-align:center;}
#cf p{font-size:14px;margin:6px 0 16px;}
/* 豎守畑遒ｺ隱搾ｼ医さ繝ｳ繝代け繝茨ｼ・*/
#ask .card{width:min(250px,80vw);padding:13px 15px;text-align:center;}
#ask h2{font-size:14px;margin:0 0 6px;}
#ask #askMsg{font-size:12.5px;margin:0 0 12px;color:#555;}
#ask .actions{margin-top:0;}
#ask .actions button{padding:5px 13px;font-size:13px;}
/* 繝ｫ繝ｼ繝・ぅ繝ｳ陦後・繝弱・繝・*/
#routines{position:absolute;left:0;z-index:4;}
#daynotes{position:absolute;left:0;z-index:4;border-top:2px solid #aaa;}
.routine-row{position:relative;height:30px;border-bottom:1px solid rgba(0,0,0,.08);}
.rr-label{position:sticky;left:0;z-index:8;width:52px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-right:1px solid rgba(0,0,0,.15);flex-shrink:0;white-space:nowrap;overflow:hidden;}
.rcell{position:absolute;top:0;width:46px;height:30px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;-webkit-user-select:none;user-select:none;border-right:1px solid rgba(0,0,0,.06);touch-action:manipulation;}
.rcell:hover{filter:brightness(.92);}
.rcell.sel{outline:2px solid #2176c2;outline-offset:-2px;background:rgba(33,118,194,.22);z-index:7;}
.rcell-grey{background:rgba(0,0,0,.06);}
.note-label{position:sticky;left:0;z-index:8;width:52px;height:100%;display:inline-flex;align-items:flex-start;justify-content:center;padding-top:4px;font-size:10px;font-weight:700;background:#fffde7;color:#888;border-right:1px solid #ddd;flex-shrink:0;}
.ncell{position:absolute;top:0;width:46px;min-height:100%;font-size:11px;line-height:1.4;padding:2px 3px;white-space:pre;overflow:visible;border-right:1px solid rgba(0,0,0,.04);color:#333;}
.ncell.has{z-index:6;}
.ncell.sel{outline:2px solid #2176c2;background:rgba(33,118,194,.16);z-index:7;}
.noteEditTa{position:absolute;font:inherit;font-size:11px;line-height:1.4;padding:2px 3px;border:1px solid #2176c2;z-index:10;background:rgba(255,255,200,.98);outline:none;resize:both;overflow:auto;white-space:pre;}
.ncell-grey{color:#666;}
/* 繝ｫ繝ｼ繝・ぅ繝ｳ險ｭ螳壹Δ繝ｼ繝繝ｫ */
#rrList{max-height:300px;overflow-y:auto;}
.rr-list-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;margin-bottom:4px;}
/* 繝代せ繝ｯ繝ｼ繝臥判髱｢ */
.pw-screen{position:fixed;inset:0;background:#1f3b57;display:flex;align-items:center;justify-content:center;z-index:100;}
.pw-card{background:#fff;border-radius:14px;padding:32px 28px;width:min(300px,88vw);text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.pw-logo{font-size:32px;margin-bottom:8px;}
.pw-card h2{margin:0 0 4px;font-size:17px;color:#1f3b57;}
.pw-sub{font-size:12px;color:#666;margin:0 0 18px;min-height:16px;}
.pw-fld{margin-bottom:12px;text-align:left;}
.pw-label{font-size:12px;color:#555;display:block;margin-bottom:4px;}
.pw-input{font-size:24px;letter-spacing:8px;text-align:center;padding:10px;border:2px solid #ccc;border-radius:8px;width:100%;font:inherit;transition:border-color .15s;}
.pw-input:focus{border-color:#2176c2;outline:none;}
.pw-err{color:#c62828;font-size:12px;min-height:16px;margin:2px 0 8px;text-align:left;}
.pw-btn{width:100%;padding:11px;font-size:14px;margin-top:2px;border-radius:8px;}

</style>
</head>
<body>

<header class="bar">
  <h1>繧ｹ繝ｩ繧､繝牙ｼ上せ繧ｱ繧ｸ繝･繝ｼ繝ｫ</h1>
  <span class="legend"><span>笆莠亥ｮ・/span><span>笆｡遒ｺ螳・/span><span>笘・・繧､繝ｫ繧ｹ繝医・繝ｳ</span><span>・晞｣譌･</span></span>
  <span class="sp"></span>
  <button id="btnPrevM" class="ghost" title="蜑阪・譛医∈">笳</button>
  <select id="monthJump" class="mjump" title="譛医∈繧ｸ繝｣繝ｳ繝・></select>
  <button id="btnNextM" class="ghost" title="谺｡縺ｮ譛医∈">笆ｶ</button>
  <button id="btnToday" class="ghost">莉頑律縺ｸ</button>
  <button id="btnAdd">・・霑ｽ蜉</button>
  <button id="btnLink" class="ghost" title="蜷梧悄繝輔か繝ｫ繝縺ｮ schedule.json 縺ｨ騾｣謳ｺ">迫 騾｣謳ｺ</button>
  <button id="btnLinkNew" class="ghost" title="譁ｰ隕・schedule.json 繧剃ｽ懈・縺励※騾｣謳ｺ">・</button>
  <button id="btnExport" class="ghost">譖ｸ蜃ｺ</button>
  <button id="btnImport" class="ghost">蜿冶ｾｼ</button>
  <button id="btnChangePw" class="ghost" title="繝代せ繝ｯ繝ｼ繝峨ｒ螟画峩">泊</button>
  <button id="btnRR" class="ghost" title="繝ｫ繝ｼ繝・ぅ繝ｳ陦後・險ｭ螳・>笞・繝ｫ繝ｼ繝・ぅ繝ｳ</button>
  <span id="linkStat"></span>
  <input id="file" type="file" accept="application/json" hidden>
</header>

<div id="scroll">
  <div id="grid">
    <div id="colbg"></div>
    <div id="today"></div>
    <div id="head"></div>
    <div id="lanes"></div>
    <div id="routines"></div>
    <div id="daynotes"></div>
  </div>
</div>

<!-- 霑ｽ蜉繝ｻ邱ｨ髮・-->
<div id="ov" class="ov">
  <div class="card">
    <h2 id="mTitle">繧ｿ繧ｹ繧ｯ繧定ｿｽ蜉</h2>
    <div class="fld">
      <label>遞ｮ蛻･</label>
      <div class="seg" id="segType">
        <button data-t="plan">笆 莠亥ｮ・/button>
        <button data-t="fix">笆｡ 遒ｺ螳・/button>
        <button data-t="ms">笘・繝槭う繝ｫ繧ｹ繝医・繝ｳ</button>
      </div>
    </div>
    <div class="fld">
      <label>繧ｿ繧､繝医Ν <span style="color:#c62828">*</span></label>
      <input id="fTitle" placeholder="萓具ｼ吋R莨夊ｭｰ">
    </div>
    <div class="row2">
      <div class="fld"><label>髢句ｧ区律</label><input id="fStart" type="date"></div>
      <div class="fld"><label>邨ゆｺ・律・磯｣譌･縺ｮ縺ｿ・・/label><input id="fEnd" type="date"></div>
    </div>
    <div class="fld"><label>陦鯉ｼ医Ξ繝ｼ繝ｳ・・/label><input id="fLane" type="number" min="0" value="0"></div>
    <hr style="border:none;border-top:1px solid #eee;margin:4px 0 10px">
    <div style="font-size:12px;color:#888;margin-bottom:8px">繧ｪ繝励す繝ｧ繝ｳ・育┌縺代ｌ縺ｰ遨ｺ谺・〒OK・上ち繧､繝医Ν縺ｮ縺ｿ陦ｨ遉ｺ・・/div>
    <div class="row2">
      <div class="fld"><label>譎る俣・・・・/label><input id="fTime" placeholder="18:00"></div>
      <div class="fld"><label>蝣ｴ謇・・n・・/label><input id="fPlace" placeholder="讓ｪ豬憺ｧ・></div>
    </div>
    <div class="fld"><label>莠ｺ・・ith・・/label><input id="fWho" placeholder="逕ｰ荳ｭ, 驤ｴ譛ｨ"></div>
    <div class="actions">

      <button id="btnSave">菫晏ｭ・/button>
    </div>
  </div>
</div>

<!-- 遒ｺ螳夂｢ｺ隱・-->
<div id="cf" class="ov">
  <div class="card">
    <h2>遒ｺ螳壹＠縺ｾ縺吶°・・/h2>
    <p id="cfMsg"></p>
    <div class="actions">
      <span class="sp"></span>
      <button id="cfNo" class="cancel">縺・＞縺・/button>
      <button id="cfYes">縺ｯ縺・/button>
    </div>
  </div>
</div>

<!-- 豎守畑 遒ｺ隱阪ム繧､繧｢繝ｭ繧ｰ -->
<div id="ask" class="ov">
  <div class="card">
    <h2 id="askTitle">遒ｺ隱・/h2>
    <p id="askMsg"></p>
    <div class="actions">
      <span class="sp"></span>
      <button id="askNo" class="cancel">縺・＞縺・/button>
      <button id="askYes" class="danger">縺ｯ縺・/button>
    </div>
  </div>
</div>

<!-- 繝ｫ繝ｼ繝・ぅ繝ｳ陦後Μ繧ｹ繝郁ｨｭ螳・-->
<div id="rrOv" class="ov">
  <div class="card">
    <h2>繝ｫ繝ｼ繝・ぅ繝ｳ陦後・險ｭ螳・/h2>
    <div id="rrList"></div>
    <button id="rrAddBtn" style="margin-top:10px;width:100%">・・陦後ｒ霑ｽ蜉</button>
    <div class="actions" style="margin-top:10px">
      <span class="sp"></span>
      <button id="rrClose" class="cancel">髢峨§繧・/button>
    </div>
  </div>
</div>

<!-- 繝ｫ繝ｼ繝・ぅ繝ｳ陦・邱ｨ髮・-->
<div id="rrEditOv" class="ov">
  <div class="card">
    <h2 id="rrEditTitle">繝ｫ繝ｼ繝・ぅ繝ｳ陦後ｒ霑ｽ蜉</h2>
    <div class="fld"><label>陦悟錐</label><input id="rrFLabel" placeholder="萓具ｼ壹ず繝縲・・"></div>
    <div class="fld">
      <label>閭梧勹濶ｲ</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="rrFColor" type="color" value="#fff9c4" style="width:48px;height:34px;border:1px solid #ccc;border-radius:6px;padding:2px;cursor:pointer">
        <span id="rrFColorHex" style="font-size:12px;color:#666">#fff9c4</span>
      </div>
    </div>
    <div class="fld">
      <label>繝槭・繧ｫ繝ｼ・医き繝ｳ繝槫玄蛻・ｊ縺ｧ隍・焚險ｭ螳壼庄・・/label>
      <input id="rrFMarkers" placeholder="萓・ 繧ｸ縲縺ｾ縺溘・縲MH,MY">
      <span style="font-size:11px;color:#888;margin-top:3px">繧ｯ繝ｪ繝・け縺吶ｋ縺溘・縺ｫ鬆・分縺ｫ蛻・崛 竊・譛蠕後・谺｡縺ｯ遨ｺ逋ｽ縺ｫ謌ｻ繧・/span>
    </div>
    <div class="actions">
      <button id="rrFDelete" class="danger" style="display:none">蜑企勁</button>
      <span class="sp"></span>
      <button id="rrFCancel" class="cancel">繧ｭ繝｣繝ｳ繧ｻ繝ｫ</button>
      <button id="rrFSave">菫晏ｭ・/button>
    </div>
  </div>
</div>

<!-- 繝代せ繝ｯ繝ｼ繝臥判髱｢・郁ｵｷ蜍墓凾繧ｪ繝ｼ繝舌・繝ｬ繧､・・-->
<div id="pwScreen" class="pw-screen">
  <div class="pw-card">
    <div class="pw-logo">套</div>
    <h2 id="pwScreenTitle">繝代せ繝ｯ繝ｼ繝峨ｒ蜈･蜉・/h2>
    <p id="pwScreenSub" class="pw-sub"></p>

        <input id="pwNew1" type="password" maxlength="4" inputmode="numeric"
               pattern="[0-9]*" placeholder="窶｢窶｢窶｢窶｢" class="pw-input" autocomplete="new-password">
      </div>
      <div class="pw-fld">
        <label class="pw-label">遒ｺ隱榊・蜉・/label>
        <input id="pwNew2" type="password" maxlength="4" inputmode="numeric"
               pattern="[0-9]*" placeholder="窶｢窶｢窶｢窶｢" class="pw-input" autocomplete="new-password">
      </div>
      <p id="pwRegErr" class="pw-err"></p>
      <button id="pwRegSubmit" class="pw-btn">險ｭ螳壹＠縺ｦ髢九￥</button>
    </div>
  </div>
</div>

<!-- 繝代せ繝ｯ繝ｼ繝牙､画峩繝｢繝ｼ繝繝ｫ -->
<div id="pwChangeOv" class="ov">
  <div class="card">
    <h2>繝代せ繝ｯ繝ｼ繝峨ｒ螟画峩</h2>
    <div class="fld">
      <label>迴ｾ蝨ｨ縺ｮ繝代せ繝ｯ繝ｼ繝・/label>
      <input id="pwCurr" type="password" maxlength="4" inputmode="numeric" placeholder="窶｢窶｢窶｢窶｢" style="letter-spacing:6px;text-align:center;font-size:18px">
    </div>
    <div class="fld">
      <label>譁ｰ縺励＞繝代せ繝ｯ繝ｼ繝会ｼ・譯・ｼ・/label>
      <input id="pwChNew1" type="password" maxlength="4" inputmode="numeric" placeholder="窶｢窶｢窶｢窶｢" style="letter-spacing:6px;text-align:center;font-size:18px">
    </div>
    <div class="fld">
      <label>遒ｺ隱榊・蜉・/label>
      <input id="pwChNew2" type="password" maxlength="4" inputmode="numeric" placeholder="窶｢窶｢窶｢窶｢" style="letter-spacing:6px;text-align:center;font-size:18px">
    </div>
    <p id="pwChErr" class="pw-err" style="margin:0 0 8px"></p>
    <div class="actions">
      <span class="sp"></span>
      <button id="pwChCancel" class="cancel">繧ｭ繝｣繝ｳ繧ｻ繝ｫ</button>
      <button id="pwChSave">螟画峩</button>
    </div>
  </div>
</div>




<script>
/* =========================================================================
 * store.js 窶・菫晏ｭ倥い繝繝励ち・・螻､繝｢繝・Ν・・ *   - 隨ｬ1螻､: localStorage・亥叉譎ゅ・鬮倬溘く繝｣繝・す繝･・・ *   - 隨ｬ2螻､: 蜷梧悄繝輔か繝ｫ繝荳翫・ schedule.json・域ｭ｣譛ｬ・洲ile System Access API・・ *
 * 繝・・繧ｿ縺ｯ AES-256-GCM + PBKDF2 縺ｧ證怜捷蛹悶＠縺ｦ菫晏ｭ倥・ * 繝代せ繝ｯ繝ｼ繝峨・繧ｻ繝・す繝ｧ繝ｳ荳ｭ縺ｮ縺ｿ JS 繝｡繝｢繝ｪ縺ｫ菫晄戟・域ｰｸ邯壻ｿ晏ｭ倥＠縺ｪ縺・ｼ峨・ * ========================================================================= */
const Store = (() => {
  const LS_KEY  = 'schedTimeline.v2';
  const OLD_KEY = 'schedTimeline.v1';
  const IDB_DB  = 'schedStore';
  const IDB_OS  = 'handles';
  const HKEY    = 'scheduleJson';

  let fileHandle = null;
  const supportsFS = (typeof window !== 'undefined') && ('showOpenFilePicker' in window);
  const nowISO = () => new Date().toISOString();

  // ---- Base64 繝ｦ繝ｼ繝・ぅ繝ｪ繝・ぅ ----
  const b64enc = buf => {
    const bytes = new Uint8Array(buf); let s = '';
    for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  };
  const b64dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

  // ---- 證怜捷蛹・AES-256-GCM + PBKDF2・・0荳・屓繧ｹ繝医Ξ繝・メ・・---
  async function deriveKey(password, salt) {
    const km = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
    );
  }

  async function encrypt(stateObj, password) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12));
    const key  = await deriveKey(password, salt);
    const enc  = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv }, key,
      new TextEncoder().encode(JSON.stringify(stateObj))
    );
    return { encrypted: true, salt: b64enc(salt), iv: b64enc(iv), data: b64enc(new Uint8Array(enc)) };
  }

  async function decrypt(blob, password) {
    const key = await deriveKey(password, b64dec(blob.salt));
    const dec = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: b64dec(blob.iv) }, key, b64dec(blob.data)
    );
    return migrate(JSON.parse(new TextDecoder().decode(dec)));
  }

  function isEncrypted(raw) {
    return !!(raw && raw.encrypted === true);
  }

  // ---- 繝・・繧ｿ繝｢繝・Ν / 繧ｹ繧ｭ繝ｼ繝樒ｧｻ陦・----
  function emptyState() {
    return { schemaVersion: 1, meta: { updatedAt: nowISO(), owner: '' }, tasks: [], holidays: [], routineRows: [], dayNotes: {} };
  }

  function migrate(raw) {
    if (!raw || typeof raw !== 'object') return null;
    const s = emptyState();
    s.tasks = (raw.tasks || []).map(t => ({
      id:        t.id,
      type:      t.type || 'plan',
      title:     t.title || '',
      start:     t.start || '',
      end:       t.end || '',
      lane:      t.lane || 0,
      time:      t.time || '',
      place:     t.place || '',
      who:       t.who || '',
      updatedAt: t.updatedAt || nowISO()
    }));
    s.holidays      = Array.isArray(raw.holidays) ? raw.holidays.slice() : [];
    s.routineRows   = Array.isArray(raw.routineRows) ? raw.routineRows.map(r => ({
      id:      r.id || ('rr'+Math.random().toString(36).slice(2,9)),
      label:   r.label  || '',
      color:   r.color  || '#f0f0f0',
      markers: Array.isArray(r.markers) ? r.markers : (r.markers ? String(r.markers).split(',').map(x=>x.trim()).filter(Boolean) : []),
      cells:   (r.cells && typeof r.cells === 'object') ? r.cells : {}
    })) : [];
    s.dayNotes      = (raw.dayNotes && typeof raw.dayNotes === 'object') ? raw.dayNotes : {};
    s.schemaVersion = 1;
    s.meta = {
      updatedAt: (raw.meta && raw.meta.updatedAt) || nowISO(),
      owner:     (raw.meta && raw.meta.owner) || ''
    };
    return s;
  }

  // ---- localStorage 螻､ ----
  function loadLocalRaw() {
    try { const j = JSON.parse(localStorage.getItem(LS_KEY)); if (j) return j; } catch(e) {}
    try { const o = JSON.parse(localStorage.getItem(OLD_KEY)); if (o) return o; } catch(e) {}
    return null;
  }

  async function saveLocalEnc(state, password) {
    try {
      const blob = await encrypt(state, password);
      localStorage.setItem(LS_KEY, JSON.stringify(blob));
    } catch(e) {}
  }

  // ---- IndexedDB・医ヵ繧｡繧､繝ｫ繝上Φ繝峨Ν繧貞・隱ｭ霎ｼ蠕後ｂ菫晄戟縺吶ｋ縺溘ａ・・---
  function idb() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(IDB_DB, 1);
      r.onupgradeneeded = () => r.result.createObjectStore(IDB_OS);
      r.onsuccess = () => res(r.result);
      r.onerror   = () => rej(r.error);
    });
  }
  async function idbGet(k) {
    const db = await idb();
    return new Promise((res, rej) => {
      const q = db.transaction(IDB_OS,'readonly').objectStore(IDB_OS).get(k);
      q.onsuccess = () => res(q.result); q.onerror = () => rej(q.error);
    });
  }
  async function idbSet(k, v) {
    const db = await idb();
    return new Promise((res, rej) => {
      const tx = db.transaction(IDB_OS,'readwrite');
      tx.objectStore(IDB_OS).put(v, k);
      tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
    });
  }

  // ---- 繝輔ぃ繧､繝ｫ繝上Φ繝峨Ν / 讓ｩ髯・----
  // 險ｱ蜿ｯ遒ｺ隱阪・縺ｿ・医ム繧､繧｢繝ｭ繧ｰ縺ｪ縺暦ｼ・ 襍ｷ蜍墓凾縺ｮ閾ｪ蜍募酔譛溽畑
  async function checkPermission(handle, mode) {
    if (!handle || !handle.queryPermission) return true;
    return (await handle.queryPermission({ mode })) === 'granted';
  }
  // 險ｱ蜿ｯ繧呈・遉ｺ逧・↓繝ｪ繧ｯ繧ｨ繧ｹ繝茨ｼ医ム繧､繧｢繝ｭ繧ｰ縺ゅｊ・・ 繝ｦ繝ｼ繧ｶ繝ｼ謫堺ｽ懈凾縺ｮ縺ｿ蜻ｼ縺ｶ
  async function ensurePermission(handle, mode) {
    if (!handle || !handle.queryPermission) return true;
    const opts = { mode };
    if (await handle.queryPermission(opts) === 'granted') return true;
    if (await handle.requestPermission(opts) === 'granted') return true;
    return false;
  }
  async function restoreHandle() {
    if (!supportsFS) return null;
    try { const h = await idbGet(HKEY); if (h) { fileHandle = h; return h; } } catch(e) {}
    return null;
  }
  async function bindFile() {
    if (!supportsFS) throw new Error('unsupported');
    const [h] = await window.showOpenFilePicker({
      multiple: false,
      types: [{ description: 'Schedule JSON', accept: { 'application/json': ['.json'] } }]
    });
    fileHandle = h; await idbSet(HKEY, h); return h;
  }
  async function createFile() {
    if (!supportsFS) throw new Error('unsupported');
    const h = await window.showSaveFilePicker({
      suggestedName: 'schedule.json',
      types: [{ description: 'Schedule JSON', accept: { 'application/json': ['.json'] } }]
    });
    fileHandle = h; await idbSet(HKEY, h); return h;
  }

  async function _doReadFile(password) {
    const f    = await fileHandle.getFile();
    const text = await f.text();
    if (!text.trim()) return null;
    const raw = JSON.parse(text);
    if (isEncrypted(raw)) {
      if (!password) return null;
      return await decrypt(raw, password);
    }
    return migrate(raw);
  }
  // 繝ｦ繝ｼ繧ｶ繝ｼ謫堺ｽ懈凾・芋沐励・繧ｿ繝ｳ遲会ｼ会ｼ夊ｨｱ蜿ｯ繝繧､繧｢繝ｭ繧ｰ繧貞・縺励※繧０K
  async function readFile(password) {
    if (!fileHandle) return null;
    if (!await ensurePermission(fileHandle, 'read')) return null;
    try { return await _doReadFile(password); } catch(e) { return null; }
  }
  // 襍ｷ蜍墓凾縺ｮ閾ｪ蜍募酔譛滂ｼ夊ｨｱ蜿ｯ貂医∩縺ｮ蝣ｴ蜷医・縺ｿ螳溯｡鯉ｼ医ム繧､繧｢繝ｭ繧ｰ縺ｪ縺暦ｼ・  async function readFileIfPermitted(password) {
    if (!fileHandle) return null;
    if (!await checkPermission(fileHandle, 'read')) return null;
    try { return await _doReadFile(password); } catch(e) { return null; }
  }

  async function _doWriteFile(state, password) {
    const blob = await encrypt(state, password);
    const w = await fileHandle.createWritable();
    await w.write(JSON.stringify(blob, null, 2));
    await w.close();
    return true;
  }
  // 繝ｦ繝ｼ繧ｶ繝ｼ謫堺ｽ懈凾・夊ｨｱ蜿ｯ繝繧､繧｢繝ｭ繧ｰ繧貞・縺励※繧０K
  async function writeFile(state, password) {
    if (!fileHandle) return false;
    if (!await ensurePermission(fileHandle, 'readwrite')) return false;
    return _doWriteFile(state, password);
  }
  // 閾ｪ蜍穂ｿ晏ｭ俶凾・夊ｨｱ蜿ｯ貂医∩縺ｮ蝣ｴ蜷医・縺ｿ螳溯｡鯉ｼ医ム繧､繧｢繝ｭ繧ｰ縺ｪ縺暦ｼ・  async function writeFileIfPermitted(state, password) {
    if (!fileHandle) return false;
    if (!await checkPermission(fileHandle, 'readwrite')) return false;
    return _doWriteFile(state, password);
  }

  // ---- 遶ｶ蜷郁ｧ｣豎ｺ・嗄eta.updatedAt 縺梧眠縺励＞譁ｹ繧呈治逕ｨ ----
  // routineRows繝ｻdayNotes 縺ｯ譁ｰ縺励＞譁ｹ縺檎ｩｺ縺ｧ繧ょ商縺・婿縺ｮ繝・・繧ｿ繧剃ｿ晄戟縺吶ｋ・医ヵ繧｡繧､繝ｫ髱槫ｯｾ蠢懈凾縺ｮ荳頑嶌縺埼亟豁｢・・  function newer(a, b) {
    if (!a) return b; if (!b) return a;
    const ta = new Date((a.meta && a.meta.updatedAt) || 0).getTime();
    const tb = new Date((b.meta && b.meta.updatedAt) || 0).getTime();
    const win = tb > ta ? b : a;
    const los = tb > ta ? a : b;
    const routineRows = (win.routineRows && win.routineRows.length) ? win.routineRows : (los.routineRows || []);
    const dayNotes = Object.keys(win.dayNotes || {}).length ? win.dayNotes : (los.dayNotes || {});
    return { ...win, routineRows, dayNotes };
  }

  return {
    supportsFS, nowISO, emptyState, migrate,
    isEncrypted, encrypt, decrypt,
    loadLocalRaw, saveLocalEnc,
    restoreHandle, bindFile, createFile,
    readFile, readFileIfPermitted,
    writeFile, writeFileIfPermitted,
    newer,
    get hasFile() { return !!fileHandle; },
    get fileName() { return fileHandle ? fileHandle.name : ''; }
  };
})();

</script>
<script>
/* =========================================================================
 * app.js 窶・繧ｹ繝ｩ繧､繝牙ｼ上せ繧ｱ繧ｸ繝･繝ｼ繝ｫ 譛ｬ菴薙Ο繧ｸ繝・け
 *   謠冗判繝ｻ謫堺ｽ懶ｼ医せ繧ｯ繝ｭ繝ｼ繝ｫ / 騾｣譌･驕ｸ謚・/ D&D / 霑ｽ蜉繝ｻ邱ｨ髮・/ 譛医ず繝｣繝ｳ繝暦ｼ・ *   繝ｫ繝ｼ繝・ぅ繝ｳ陦後・繝輔Μ繝ｼ繧ｳ繝｡繝ｳ繝域ｬ・ *   菫晏ｭ倥・ store.js・・tore・峨↓蟋碑ｭｲ・哂ES-GCM 證怜捷蛹・+ localStorage / schedule.json
 * ========================================================================= */
const DAY_W=46, LANE_H=30, HEAD_H=70, LABEL_W=52, NOTE_H=100;
const WD=['譌･','譛・,'轣ｫ','豌ｴ','譛ｨ','驥・,'蝨・];
const RANGE_START='2026-01-01', RANGE_END='2026-12-31';

const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,'0');
const fmt=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const parse=s=>{const[y,m,dd]=s.split('-').map(Number);return new Date(y,m-1,dd);};

const days=[];
for(let d=parse(RANGE_START); d<=parse(RANGE_END); d.setDate(d.getDate()+1)) days.push(fmt(d));
const idxOf=s=>days.indexOf(s);

// 譛医・蛹ｺ蛻・ｊ・域怦繧ｸ繝｣繝ｳ繝礼畑・・const months=[];
days.forEach((s,i)=>{const d=parse(s);const key=d.getFullYear()+'-'+d.getMonth();
  if(!months.length||months[months.length-1].key!==key)
    months.push({key,label:`${d.getFullYear()}蟷ｴ${d.getMonth()+1}譛・,idx:i});});

// ---------- state / 繧ｻ繝・す繝ｧ繝ｳ繝代せ繝ｯ繝ｼ繝・----------
let state = Store.emptyState();
let sessionPwd = null;

function id(){ return 'k'+Math.random().toString(36).slice(2,9); }
function stamp(t){ if(t) t.updatedAt = Store.nowISO(); }

async function save(){
  if(!state.meta) state.meta={updatedAt:'',owner:''};
  state.meta.updatedAt = Store.nowISO();
  await Store.saveLocalEnc(state, sessionPwd);
  if(Store.hasFile) Store.writeFileIfPermitted(state, sessionPwd).catch(()=>{});
}

function seed(){return[
  {id:id(),type:'plan',title:'DR莨夊ｭｰ',start:'2026-06-08',end:'',lane:0,updatedAt:Store.nowISO()},
  {id:id(),type:'plan',title:'AI螳壻ｾ句ｱ蜻贋ｼ・,start:'2026-06-09',end:'',lane:1,updatedAt:Store.nowISO()},
  {id:id(),type:'fix', title:'譬・惠蟾･蝣ｴ蜃ｺ蠑ｵ',start:'2026-06-09',end:'2026-06-11',lane:2,updatedAt:Store.nowISO()},
  {id:id(),type:'fix', title:'鬟滉ｺ倶ｼ・,start:'2026-06-09',end:'',lane:4,time:'18:00',place:'讓ｪ豬憺ｧ・,updatedAt:Store.nowISO()},
  {id:id(),type:'ms',  title:'譛ｬ逡ｪ遶九■荳翫￡',start:'2026-06-24',end:'',lane:0,updatedAt:Store.nowISO()},
];}

const isWeekend=s=>{const w=parse(s).getDay();return w===0||w===6;};
const isGrey=s=>isWeekend(s)||state.holidays.includes(s);
const markerOf=t=>t==='plan'?'笆':t==='fix'?'笆｡':'笘・;
function laneCount(){let m=0;state.tasks.forEach(t=>m=Math.max(m,t.lane||0));return Math.max(m+3,14);}
function durationDays(t){const si=idxOf(t.start),ei=t.end?idxOf(t.end):-1;return (t.end&&ei>si)?(ei-si+1):1;}

// 閭梧勹濶ｲ縺ｫ蟇ｾ縺吶ｋ繝・く繧ｹ繝郁牡・磯ｻ・逋ｽ・・function contrastColor(hex){
  if(!hex||hex[0]!=='#')return'#333';
  const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;
  return(0.299*r+0.587*g+0.114*b)>140?'#333':'#fff';
}

let selectedId=null;
let selectedNote=null;
let selectedRR=null;  // {rid,date} 繝ｫ繝ｼ繝・ぅ繝ｳ繧ｻ繝ｫ驕ｸ謚・
function render(){
  const colbg=$('colbg'),head=$('head'),lanes=$('lanes'),grid=$('grid');
  const LANES=laneCount(), lanesH=LANES*LANE_H, fullH=HEAD_H+lanesH;
  const totalW=days.length*DAY_W;
  const routineH=(state.routineRows||[]).length*LANE_H;
  const totalH=fullH+routineH+NOTE_H;
  grid.style.width=totalW+'px'; grid.style.height=totalH+'px';

  let bg=''; colbg.style.width=totalW+'px'; colbg.style.height=totalH+'px';
  days.forEach((s,i)=>{
    if(isGrey(s)) bg+=`<div class="col grey" style="left:${i*DAY_W}px;height:${totalH}px"></div>`;
    const ms=(parse(s).getDate()===1)||i===0;
    bg+=`<div class="vline${ms?' month':''}" style="left:${i*DAY_W}px;height:${totalH}px"></div>`;
  });
  colbg.innerHTML=bg;

  const tIdx=idxOf(fmt(new Date())), today=$('today');
  if(tIdx>=0){today.style.display='block';today.style.left=(tIdx*DAY_W)+'px';today.style.height=totalH+'px';}
  else today.style.display='none';

  // header month groups
  let h='',i=0;
  while(i<days.length){
    const d=parse(days[i]),y=d.getFullYear(),mo=d.getMonth();
    let span=0; while(i+span<days.length){const dd=parse(days[i+span]); if(dd.getFullYear()!==y||dd.getMonth()!==mo)break; span++;}
    h+=`<div class="mcell" style="left:${i*DAY_W}px;width:${span*DAY_W}px">${y}蟷ｴ${mo+1}譛・/div>`;
    i+=span;
  }
  let drow='',wrow='';
  days.forEach((s,i)=>{
    const w=parse(s).getDay(), cls=w===6?'sat':w===0?'sun':'';
    drow+=`<div class="dcell ${cls}" data-d="${s}" style="left:${i*DAY_W}px">${s.slice(8)}</div>`;
    wrow+=`<div class="wcell ${cls}" style="left:${i*DAY_W}px">${WD[w]}</div>`;
  });
  head.style.width=totalW+'px';
  head.innerHTML=`<div class="mrow" style="width:${totalW}px">${h}</div>`+
                 `<div class="drow" style="width:${totalW}px">${drow}</div>`+
                 `<div class="wrow" style="width:${totalW}px">${wrow}</div>`;

  lanes.style.width=totalW+'px'; lanes.style.height=lanesH+'px';
  let ll='';
  for(let k=0;k<=LANES;k++) ll+=`<div class="laneline" style="top:${k*LANE_H}px;width:${totalW}px"></div>`;
  state.tasks.forEach(t=>{
    const si=idxOf(t.start); if(si<0)return;
    const cls=['task']; if(t.type==='ms')cls.push('ms'); if(t.id===selectedId)cls.push('sel');
    ll+=`<div class="${cls.join(' ')}" data-id="${t.id}" style="left:${si*DAY_W+2}px;top:${(t.lane||0)*LANE_H+3}px">${labelHTML(t)}</div>`;
  });
  lanes.innerHTML=ll;

  renderRoutines();
  renderNotes();
}

function labelHTML(t){
  if(t.type==='ms') return `笘・{escapeHTML(t.title)}`;
  const mk=markerOf(t.type);
  const ei=t.end?idxOf(t.end):-1, si=idxOf(t.start);
  if(t.end&&ei>si){
    const n=ei-si+1;
    let inner='';
    for(let j=0;j<n;j++){
      if(j>0) inner+=`<span class="lnk" style="left:${(j-1)*DAY_W+13}px;width:${DAY_W-13}px"></span>`;
      inner+=`<span class="mk" style="left:${j*DAY_W}px">${mk}</span>`;
    }
    const w=(n-1)*DAY_W+16;
    return `<span class="spanwrap" style="width:${w}px">${inner}</span>`+escapeHTML(t.title)+optsText(t);
  }
  return `<span class="mk">${mk}</span>`+escapeHTML(t.title)+optsText(t);
}
function optsText(t){
  let s='';
  if(t.time) s+='@'+t.time;
  if(t.place) s+=' in '+t.place;
  if(t.who) s+=' with '+t.who;
  return escapeHTML(s);
}
const escapeHTML=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// 繧ｪ繝励す繝ｧ繝ｳ隗｣譫撰ｼ・@譎る俣 / in 蝣ｴ謇 / with 莠ｺ
function parseInline(raw){
  const out={title:'',time:'',place:'',who:''};
  let s=' '+raw.trim()+' ';
  let m;
  if((m=s.match(/@(\S+)/)))                       { out.time =m[1].trim();         s=s.replace(m[0],' '); }
  if((m=s.match(/\sin\s+(.+?)(?=\swith\s|$)/i)))  { out.place=m[1].trim();         s=s.replace(m[0],' '); }
  if((m=s.match(/\swith\s+(.+?)\s*$/i)))          { out.who  =m[1].trim();         s=s.replace(m[0],' '); }
  out.title=s.replace(/\s+/g,' ').trim();
  return out;
}

// ---------- 繝ｫ繝ｼ繝・ぅ繝ｳ陦梧緒逕ｻ ----------
function renderRoutines(){
  const el=$('routines'); if(!el)return;
  const rows=state.routineRows||[];
  const fullH=HEAD_H+laneCount()*LANE_H;
  const totalW=days.length*DAY_W;
  el.style.top=fullH+'px';
  el.style.width=totalW+'px';
  el.style.height=(rows.length*LANE_H)+'px';

  let html='';

    html+=`<div class="rr-label" style="background:${bg};color:${tc}">${escapeHTML(row.label)}</div>`;
    days.forEach((s,i)=>{
      const val=(row.cells&&row.cells[s])||'';
      const gc=isGrey(s)?' rcell-grey':'';

      html+=`<div class="rcell${gc}${sc}" data-rid="${row.id}" data-date="${s}" style="left:${i*DAY_W}px;color:${tc}">${escapeHTML(val)}</div>`;

}
// onclick螻樊ｧ縺九ｉ蜻ｼ縺ｶ繧ｰ繝ｭ繝ｼ繝舌Ν髢｢謨ｰ・域怙繧ゅす繝ｳ繝励Ν縺ｧ遒ｺ螳溘↑繧｢繝励Ο繝ｼ繝・ｼ・function rrCellClick(rid,date){
  const row=(state.routineRows||[]).find(r=>r.id===rid);
  if(!row){ alert('繧ｨ繝ｩ繝ｼ: 陦後′隕九▽縺九ｊ縺ｾ縺帙ｓ rid='+rid); return; }
  const markers=row.markers||[];
  if(!markers.length){
    alert('繝槭・繧ｫ繝ｼ縺瑚ｨｭ螳壹＆繧後※縺・∪縺帙ｓ・―n笞・繝ｫ繝ｼ繝・ぅ繝ｳ繝懊ち繝ｳ縺九ｉ陦後ｒ邱ｨ髮・＠縺ｦ繝槭・繧ｫ繝ｼ繧貞・蜉帙＠縺ｦ縺上□縺輔＞縲・n萓・ 繧ｸ縲縺ｾ縺溘・縲MH,MY');
    return;
  }
  const cur=(row.cells&&row.cells[date])||'';
  const idx=markers.indexOf(cur);
  const next=idx<markers.length-1?markers[idx+1]:'';
  if(!row.cells)row.cells={};
  if(next==='') delete row.cells[date]; else row.cells[date]=next;
  save(); renderRoutines();
}

// ---------- scroll / select / inline / task-drag ----------
const scroll=$('scroll'), lanes=$('lanes');
let mode=null, sx=0, sl=0, moved=false, startCell=null, selStart=0, selEnd=0, selLane=0, selBox=null;
let taskDrag=null;
let pendingCell=null;
let lastTapId=null, lastTapTime=0;
const DBL_MS=320;

function cellFromEvent(e){
  const r=lanes.getBoundingClientRect();
  const di=Math.floor((e.clientX-r.left)/DAY_W);
  const ln=Math.floor((e.clientY-r.top)/LANE_H);
  return {di,ln};
}

scroll.addEventListener('pointerdown',e=>{
  // 繝ｫ繝ｼ繝・ぅ繝ｳ陦後・繝｡繝｢縺ｮ繧ｻ繝ｫ縺ｯ險倬鹸縺縺代＠縺ｦ縲√せ繧ｯ繝ｭ繝ｼ繝ｫ蜃ｦ逅・↓蜷域ｵ・ｼ医ラ繝ｩ繝・げ遘ｻ蜍募庄繝ｻ繝繝悶Ν繧ｯ繝ｪ繝・け縺ｧ蜈･蜉幢ｼ・  const rcell=e.target.closest('.rcell');
  const ncell=e.target.closest('.ncell');
  pendingCell = rcell ? {kind:'rr',cell:rcell}
              : ncell ? {kind:'note',cell:ncell}
              : null;
  if(!ncell && selectedNote!==null){ selectedNote=null; renderNotes(); }
  if(!rcell && selectedRR!==null){ selectedRR=null; renderRoutines(); }
  if(!rcell && !ncell){
    const taskEl=e.target.closest('.task');
    if(taskEl){
      const t=state.tasks.find(x=>x.id===taskEl.dataset.id);
      if(t){
        taskDrag={t,el:taskEl,onMk:e.target.classList.contains('mk'),
          startX:e.clientX,startY:e.clientY,
          grabDi:cellFromEvent(e).di-idxOf(t.start),
          moved:false,previewDi:null,previewLn:null};
      }
      return;
    }
    if(e.target.closest('.inlineEdit')) return;
    if(selectedId!==null){selectedId=null; render();}
    removeInline();
    const overLanes=e.target.closest('#lanes');
    if(e.shiftKey && overLanes){
      const c=cellFromEvent(e); if(c.di<0||c.di>=days.length)return;
      mode='range'; selLane=c.ln; selStart=selEnd=c.di;
      drawSel();
      e.preventDefault();
      return;
    }
    startCell=(overLanes&&!e.target.closest('.dcell'))?cellFromEvent(e):null;
  } else {
    startCell=null;
  }
  mode='scroll'; sx=e.clientX; sl=scroll.scrollLeft; moved=false;
  scroll.classList.add('drag');
});
window.addEventListener('pointermove',e=>{
  if(taskDrag){
    const dx=e.clientX-taskDrag.startX, dy=e.clientY-taskDrag.startY;
    if(!taskDrag.moved && (Math.abs(dx)>4||Math.abs(dy)>4)){taskDrag.moved=true; taskDrag.el.classList.add('dragging');}
    if(taskDrag.moved){
      const c=cellFromEvent(e);
      const dur=durationDays(taskDrag.t);
      let di=c.di-taskDrag.grabDi;
      di=Math.max(0,Math.min(days.length-dur,di));
      const ln=Math.max(0,c.ln);
      taskDrag.el.style.left=(di*DAY_W+2)+'px';
      taskDrag.el.style.top=(ln*LANE_H+3)+'px';
      taskDrag.previewDi=di; taskDrag.previewLn=ln;
    }
    return;
  }
  if(mode==='scroll'){
    const dx=e.clientX-sx; if(Math.abs(dx)>5)moved=true;
    scroll.scrollLeft=sl-dx;
  }else if(mode==='range'){
    const c=cellFromEvent(e);
    selEnd=Math.max(0,Math.min(days.length-1,c.di));
    drawSel();
  }
});
window.addEventListener('pointerup',e=>{
  if(taskDrag){
    const td=taskDrag; taskDrag=null;
    td.el.classList.remove('dragging');
    if(td.moved && td.previewDi!=null){
      const dur=durationDays(td.t);
      td.t.start=days[td.previewDi];
      td.t.end=dur>1?days[td.previewDi+dur-1]:'';
      td.t.lane=td.previewLn;
      stamp(td.t); selectedId=td.t.id; save(); render();
    }else if(td.onMk){
      if(td.t.type==='plan') askConfirm(td.t);
      else openEdit(td.t);
    }else{
      const nowT=Date.now();
      if(lastTapId===td.t.id && (nowT-lastTapTime)<DBL_MS){
        lastTapId=null; lastTapTime=0;
        openEdit(td.t);
      }else{
        lastTapId=td.t.id; lastTapTime=nowT;
        selectedId=td.t.id; render();
      }
    }
    return;
  }
  if(mode==='scroll'){
    scroll.classList.remove('drag');
    if(!moved){
      if(pendingCell){
        // 繝ｫ繝ｼ繝・ぅ繝ｳ/繝｡繝｢・壹ム繝悶Ν繧ｯ繝ｪ繝・け縺ｧ蜈･蜉帷匱蜍・        const c=pendingCell.cell, now=Date.now();
        const cid=pendingCell.kind==='rr'
          ? 'rr:'+c.dataset.rid+':'+c.dataset.date
          : 'note:'+c.dataset.date;
        if(lastTapId===cid && now-lastTapTime<DBL_MS){
          lastTapId=null; lastTapTime=0;
          if(pendingCell.kind==='rr') rrCellClick(c.dataset.rid,c.dataset.date);
          else openNoteEdit(c.dataset.date,parseInt(c.dataset.left));
        }else{
          lastTapId=cid; lastTapTime=now;
          // 1蝗樒岼繧ｿ繝・・・夐∈謚樒憾諷九↓・医ち繧ｹ繧ｯ/繝｡繝｢/繝ｫ繝ｼ繝・ぅ繝ｳ縺ｯ謗剃ｻ悶．elete繧ｭ繝ｼ縺ｧ蜑企勁蜿ｯ閭ｽ・・          if(pendingCell.kind==='note'){
            selectedId=null; selectedRR=null; selectedNote=c.dataset.date; render();
          }else if(pendingCell.kind==='rr'){
            selectedId=null; selectedNote=null;
            selectedRR={rid:c.dataset.rid,date:c.dataset.date}; render();
          }
        }
      }else if(startCell && startCell.di>=0 && startCell.di<days.length){
        openInline(startCell.di,startCell.di,startCell.ln);
      }
    }
  }else if(mode==='range'){
    const a=Math.min(selStart,selEnd), b=Math.max(selStart,selEnd);
    clearSel();
    openInline(a,b,selLane);
  }
  mode=null; startCell=null; pendingCell=null;
});

function drawSel(){
  const a=Math.min(selStart,selEnd), b=Math.max(selStart,selEnd);
  if(!selBox){selBox=document.createElement('div');selBox.className='selbox';lanes.appendChild(selBox);}
  selBox.style.left=(a*DAY_W+1)+'px';
  selBox.style.top=(selLane*LANE_H+2)+'px';
  selBox.style.width=((b-a+1)*DAY_W-2)+'px';
}
function clearSel(){ if(selBox){selBox.remove();selBox=null;} }

// 繧､繝ｳ繝ｩ繧､繝ｳ蜈･蜉・let inlineEl=null;
function openInline(diStart,diEnd,lane){
  removeInline();
  const inp=document.createElement('input');
  inp.className='inlineEdit';
  inp.placeholder='繧ｿ繧､繝医Ν窶ｦ (@譎る俣 in 蝣ｴ謇 with 莠ｺ)';
  inp.style.left=(diStart*DAY_W+2)+'px';
  inp.style.top=(lane*LANE_H+3)+'px';
  inp.style.width=Math.max((diEnd-diStart+1)*DAY_W,160)+'px';
  inp.dataset.s=days[diStart]; inp.dataset.e=diEnd>diStart?days[diEnd]:''; inp.dataset.lane=lane;
  lanes.appendChild(inp); inp.focus(); inlineEl=inp;
  inp.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'){ commitInline(); }
    else if(ev.key==='Escape'){ removeInline(); }
  });
  inp.addEventListener('blur',()=>{ setTimeout(()=>{ if(inlineEl===inp) removeInline(); },120); });
}
function commitInline(){
  if(!inlineEl)return;
  const raw=inlineEl.value.trim();
  if(raw){
    const p=parseInline(raw);
    if(p.title){
      state.tasks.push({id:id(),type:'plan',title:p.title,
        start:inlineEl.dataset.s,end:inlineEl.dataset.e,
        lane:parseInt(inlineEl.dataset.lane,10)||0,time:p.time,place:p.place,who:p.who,
        updatedAt:Store.nowISO()});
      save();
    }
  }
  removeInline(); render();
}
function removeInline(){ if(inlineEl){inlineEl.remove();inlineEl=null;} }

    }else if(selectedNote!==null){
      e.preventDefault();
      const d=selectedNote;
      showConfirm('繝｡繝｢繧貞炎髯､','縺薙・繝｡繝｢繧貞炎髯､縺励∪縺吶°・・,()=>{
        if(state.dayNotes) delete state.dayNotes[d];
        selectedNote=null; save(); renderNotes();
      });
    }else if(selectedRR!==null){
      e.preventDefault();
      const sel=selectedRR;
      showConfirm('繝槭・繧ｫ繝ｼ繧貞炎髯､','縺薙・繝槭せ繧貞炎髯､縺励∪縺吶°・・,()=>{
        const row=(state.routineRows||[]).find(r=>r.id===sel.rid);
        if(row&&row.cells) delete row.cells[sel.date];
        selectedRR=null; save(); renderRoutines();
      });
    }
  }else if(e.key==='Escape'){
    if(selectedId!==null){selectedId=null; render();}
    if(selectedNote!==null){selectedNote=null; renderNotes();}
    if(selectedRR!==null){selectedRR=null; renderRoutines();}
  }
});

// ---------- 繝ｫ繝ｼ繝・ぅ繝ｳ陦・險ｭ螳壹Δ繝ｼ繝繝ｫ ----------
const rrOv=$('rrOv'), rrEditOv=$('rrEditOv');
let rrEditIdx=null;

function renderRRList(){
  const rows=state.routineRows||[];
  let html='';
  if(!rows.length){
    html='<p style="font-size:12px;color:#888;text-align:center;padding:12px 0">縺ｾ縺陦後′縺ゅｊ縺ｾ縺帙ｓ</p>';
  } else {
    rows.forEach((r,i)=>{
      const tc=contrastColor(r.color||'#f0f0f0');
      html+=`<div class="rr-list-item" style="background:${r.color||'#f0f0f0'}">
        <span style="flex:1;font-size:13px;font-weight:700;color:${tc}">${escapeHTML(r.label)}</span>
        <span style="font-size:11px;color:${tc};opacity:.8">${(r.markers||[]).join(' / ')||'窶・}</span>
        <button class="ghost rr-edit-btn" data-idx="${i}" style="font-size:11px;padding:3px 9px;color:${tc};background:rgba(0,0,0,.12)">邱ｨ髮・/button>
      </div>`;
    });
  }
  $('rrList').innerHTML=html;
  document.querySelectorAll('.rr-edit-btn').forEach(btn=>{
    btn.onclick=()=>openRREdit(parseInt(btn.dataset.idx));
  });
}

function openRRSettings(){
  renderRRList();
  rrOv.classList.add('show');
}
$('btnRR').onclick=()=>openRRSettings();
$('rrClose').onclick=()=>rrOv.classList.remove('show');
rrOv.addEventListener('click',e=>{ if(e.target===rrOv)rrOv.classList.remove('show'); });
$('rrAddBtn').onclick=()=>openRREdit(null);

function openRREdit(idx){
  rrEditIdx=idx;
  const row=idx!==null?(state.routineRows||[])[idx]:null;
  $('rrEditTitle').textContent=row?'繝ｫ繝ｼ繝・ぅ繝ｳ陦後ｒ邱ｨ髮・:'繝ｫ繝ｼ繝・ぅ繝ｳ陦後ｒ霑ｽ蜉';
  $('rrFLabel').value=row?row.label:'';
  $('rrFColor').value=row?(row.color||'#fff9c4'):'#fff9c4';
  $('rrFColorHex').textContent=row?(row.color||'#fff9c4'):'#fff9c4';
  $('rrFMarkers').value=row?(row.markers||[]).join(','):'';
  $('rrFDelete').style.display=row?'inline-block':'none';
  rrEditOv.classList.add('show');
}
$('rrFColor').addEventListener('input',e=>{ $('rrFColorHex').textContent=e.target.value; });
$('rrFCancel').onclick=()=>rrEditOv.classList.remove('show');
rrEditOv.addEventListener('click',e=>{ if(e.target===rrEditOv)rrEditOv.classList.remove('show'); });
$('rrFSave').onclick=()=>{
  const label=$('rrFLabel').value.trim();
  if(!label){ $('rrFLabel').focus(); return; }
  const color=$('rrFColor').value;
  const markers=$('rrFMarkers').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!state.routineRows)state.routineRows=[];
  if(rrEditIdx!==null){
    const row=state.routineRows[rrEditIdx];
    row.label=label; row.color=color; row.markers=markers;
  } else {
    state.routineRows.push({id:'rr'+Math.random().toString(36).slice(2,9),label,color,markers,cells:{}});
  }
  save(); rrEditOv.classList.remove('show'); render(); renderRRList();
};
$('rrFDelete').onclick=()=>{
  if(rrEditIdx!==null&&state.routineRows){
    const idx=rrEditIdx, row=state.routineRows[idx];
    showConfirm('繝ｫ繝ｼ繝・ぅ繝ｳ陦後ｒ蜑企勁','縲・+(row?row.label:'')+'縲阪ｒ蜑企勁縺励∪縺吶°・・,()=>{
      state.routineRows.splice(idx,1);
      save(); rrEditOv.classList.remove('show'); render(); renderRRList();
    });
  }
};

// ---------- 譛医ず繝｣繝ｳ繝・----------
function buildMonthJump(){
  $('monthJump').innerHTML=months.map((m,k)=>`<option value="${k}">${m.label}</option>`).join('');
}
function jumpMonth(k){
  k=Math.max(0,Math.min(months.length-1,k));
  scroll.scrollLeft=months[k].idx*DAY_W;
  $('monthJump').value=k;
}
function currentMonthPos(){
  const leftDi=Math.round(scroll.scrollLeft/DAY_W); let k=0;
  months.forEach((m,j)=>{ if(m.idx<=leftDi)k=j; });
  return k;
}
$('monthJump').onchange=e=>jumpMonth(parseInt(e.target.value,10));
$('btnPrevM').onclick=()=>jumpMonth(currentMonthPos()-1);
$('btnNextM').onclick=()=>jumpMonth(currentMonthPos()+1);
scroll.addEventListener('scroll',()=>{
  const k=currentMonthPos(), sel=$('monthJump');
  if(sel && parseInt(sel.value,10)!==k) sel.value=k;
});
buildMonthJump();

// ---------- toolbar ----------
$('btnAdd').onclick=()=>openAdd(fmt(new Date()),0);
$('btnToday').onclick=()=>{const i=idxOf(fmt(new Date()));if(i>=0)scroll.scrollLeft=i*DAY_W-scroll.clientWidth/2;};

$('btnExport').onclick=async()=>{
  const blob=await Store.encrypt(state, sessionPwd);
  const b=new Blob([JSON.stringify(blob,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='schedule.json';a.click();
};

$('btnImport').onclick=()=>$('file').click();
$('file').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const raw=JSON.parse(r.result);
      let j;
      if(Store.isEncrypted(raw)) j=await Store.decrypt(raw, sessionPwd);
      else j=Store.migrate(raw);
      if(j){ state=j; await save(); render(); }
    }catch(err){ alert('隱ｭ縺ｿ霎ｼ縺ｿ縺ｫ螟ｱ謨励＠縺ｾ縺励◆・医ヱ繧ｹ繝ｯ繝ｼ繝峨′驕輔≧蜿ｯ閭ｽ諤ｧ縺後≠繧翫∪縺呻ｼ・); }
  };
  r.readAsText(f);
};

// ---------- schedule.json 騾｣謳ｺ ----------
function refreshLinkStat(){
  const el=$('linkStat');
  if(!Store.supportsFS){ el.textContent='(騾｣謳ｺ: 髱槫ｯｾ蠢懊ヶ繝ｩ繧ｦ繧ｶ)'; return; }
  el.textContent = Store.hasFile ? ('迫 '+Store.fileName) : '(譛ｪ騾｣謳ｺ)';
}
$('btnLink').onclick=async()=>{
  if(!Store.supportsFS){ alert('縺薙・繝悶Λ繧ｦ繧ｶ縺ｯ schedule.json 逶ｴ謗･騾｣謳ｺ縺ｫ譛ｪ蟇ｾ蠢懊〒縺吶ゅ梧嶌蜃ｺ縲阪悟叙霎ｼ縲阪ｒ菴ｿ縺｣縺ｦ縺ｭ縲・); return; }
  try{
    await Store.bindFile();
    const fileState=await Store.readFile(sessionPwd);
    if(fileState){ const merged=Store.newer(state,fileState); if(merged!==state) state=merged; }
    await save(); render(); refreshLinkStat();
  }catch(e){}
};
$('btnLinkNew').onclick=async()=>{
  if(!Store.supportsFS){ alert('縺薙・繝悶Λ繧ｦ繧ｶ縺ｯ schedule.json 逶ｴ謗･騾｣謳ｺ縺ｫ譛ｪ蟇ｾ蠢懊〒縺吶・); return; }
  try{
    await Store.createFile();
    await save(); refreshLinkStat();
    alert('schedule.json 繧剃ｽ懈・縺励※騾｣謳ｺ縺励◆繧医０neDrive 縺ｮ蜷梧悄繝輔か繝ｫ繝縺ｫ鄂ｮ縺代・蜈ｱ譛峨〒縺阪ｋ縲・);
  }catch(e){}
};

// ---------- 襍ｷ蜍包ｼ壹ヱ繧ｹ繝ｯ繝ｼ繝臥判髱｢繧定｡ｨ遉ｺ ----------
(async()=>{
  const raw=Store.loadLocalRaw();
  if(!raw){
    state=Store.emptyState(); state.tasks=seed();
    showPwScreen('register', false);
  } else if(Store.isEncrypted(raw)){
    showPwScreen('login');
  } else {
    state=Store.migrate(raw) || Store.emptyState();
    showPwScreen('register', true);
  }
})();
